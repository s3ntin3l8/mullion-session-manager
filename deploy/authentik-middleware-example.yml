# Reference only — NOT something to apply blindly.
#
# Since Authentik + Traefik are already deployed (per the plan), you most
# likely already have a forwardAuth middleware defined once and reused
# across apps — in which case just reference its existing name@provider in
# deploy/traefik-dynamic.yml's `middlewares:` list and ignore this file.
#
# This is only here to show the shape of a typical Authentik forwardAuth
# middleware, in case you're setting up a dedicated one for this app (e.g.
# a per-app outpost) rather than reusing a shared one.

http:
  middlewares:
    CHANGEME_MIDDLEWARE_NAME:
      forwardAuth:
        address: "http://CHANGEME_AUTHENTIK_OUTPOST:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
